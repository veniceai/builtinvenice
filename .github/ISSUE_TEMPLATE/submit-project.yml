name: Submit a Project
description: Submit your project to be featured on Built in Venice
title: "[Project] "
labels: ["submission", "project"]
body:
  - type: input
    id: project-name
    attributes:
      label: Project Name
      placeholder: e.g. Your Project, @yourhandle, project-name
    validations:
      required: true

  - type: dropdown
    id: project-type
    attributes:
      label: Project Type
      options:
        - Website
        - GitHub Repo
        - X Account
    validations:
      required: true

  - type: input
    id: project-url
    attributes:
      label: Project URL
      description: Canonical link for the project.
      placeholder: https://myproject.com  /  https://github.com/owner/repo  /  https://x.com/handle
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: "Ecosystem = built specifically for the Venice community (tools, SDKs, content, assets). Powered by Venice = apps that use the Venice API. An Ecosystem project must have a specific Venice focus — not a general tool that Venice users could also use (e.g. Google Docs)."
      options:
        - "Ecosystem (built for the Venice community)"
        - "Powered by Venice (uses the Venice API)"
    validations:
      required: true

  - type: dropdown
    id: venice-relationship
    attributes:
      label: Venice relationship (Ecosystem only)
      description: How this project is built for the Venice community. Leave blank for Powered by Venice.
      options:
        - "Tooling / SDK for Venice builders"
        - "Community asset (e.g. Venice X account, token)"
        - "Content / education about Venice"
        - "Other (explain below)"

  - type: textarea
    id: venice-connection
    attributes:
      label: How is this built for Venice? (Ecosystem only)
      description: Explain the specific Venice connection — who in the Venice community uses it, and why a general AI tool wouldn't serve the same purpose. Leave blank for Powered by Venice.
      placeholder: This SDK wraps the Venice API so community builders can…

  - type: textarea
    id: description
    attributes:
      label: Description
      description: 1–2 plain sentences about what the project does (under 220 characters). Avoid marketing language.
      placeholder: Describe your project...
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated (1–4 short tags). Reuse existing tags where it makes sense.
      placeholder: SDK, TypeScript, Analytics
    validations:
      required: true

  - type: input
    id: submitted-by
    attributes:
      label: Your Name / Handle
      placeholder: e.g. @yourhandle

  # ── GitHub Repo fields ────────────────────────────────
  - type: input
    id: github-owner
    attributes:
      label: GitHub Owner (repos only)
      description: The owner portion of github.com/owner/repo.
      placeholder: e.g. yourhandle

  - type: input
    id: github-repo
    attributes:
      label: GitHub Repo Name (repos only)
      description: The repo portion of github.com/owner/repo.
      placeholder: e.g. repo-name

  - type: input
    id: language
    attributes:
      label: Primary Language (repos only)
      placeholder: e.g. TypeScript, Python

  - type: input
    id: stars
    attributes:
      label: Stars (repos only, optional)
      description: Leave blank if you don't know — maintainers will fill it in.
      placeholder: e.g. 42

  - type: input
    id: forks
    attributes:
      label: Forks (repos only, optional)
      placeholder: e.g. 5

  # ── X Account fields ──────────────────────────────────
  - type: input
    id: x-handle
    attributes:
      label: X Handle (X accounts only)
      description: Without the "@".
      placeholder: yourhandle

  - type: input
    id: x-bio
    attributes:
      label: Short bio (X accounts only)
      placeholder: One-line description of the account.

  - type: input
    id: x-followers
    attributes:
      label: Followers (X accounts only, optional)
      description: Approximate follower count. Leave blank if you don't know.
      placeholder: e.g. 4200

  # ── Socials + preview ─────────────────────────────────
  - type: textarea
    id: socials
    attributes:
      label: Connected socials (optional)
      description: |
        One per line, in the form `kind: url`. Supported kinds:
        x, github, website, farcaster, warpcast, instagram, telegram, discord, youtube, tiktok.
      placeholder: |
        x: https://x.com/yourproject
        farcaster: https://warpcast.com/yourproject
        telegram: https://t.me/yourproject

  - type: textarea
    id: screenshot
    attributes:
      label: Thumbnail (optional)
      description: Auto-filled if you submitted via the form. Otherwise drag a 16:9 image here for maintainers to use.

  # ── Quality checklist ─────────────────────────────────
  - type: checkboxes
    id: quality
    attributes:
      label: Quality Checklist
      options:
        - label: This project is publicly accessible.
          required: true
        - label: This project has a specific focus on Venice — powered by Venice or built for the Venice community — not a general-purpose tool that Venice users could also use (e.g. Google Docs).
          required: true
        - label: I understand that listing does not imply endorsement by Venice AI.
          required: true
