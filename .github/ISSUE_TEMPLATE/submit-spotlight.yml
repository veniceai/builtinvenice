name: Submit a Builder Spotlight
description: Submit a video interview or builder profile for the Venice ecosystem
title: "[Spotlight] "
labels: ["submission", "spotlight"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      placeholder: e.g. How we built openvenice as a weekend project
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Video URL
      description: YouTube, Vimeo, or other public video link.
      placeholder: https://www.youtube.com/watch?v=…
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: 1–2 plain sentences about the spotlight. Avoid marketing copy.
      placeholder: Describe what's covered...
    validations:
      required: true

  - type: input
    id: builder
    attributes:
      label: Builder handle
      description: GitHub or X handle of the person being spotlighted.
      placeholder: e.g. nikshepsvn
    validations:
      required: true

  - type: input
    id: role
    attributes:
      label: Role
      description: How to introduce them. E.g. "Creator, openvenice".
      placeholder: e.g. Creator, openvenice
    validations:
      required: true

  - type: input
    id: duration
    attributes:
      label: Duration
      description: MM:SS or HH:MM:SS.
      placeholder: e.g. 14:22
    validations:
      required: true

  - type: input
    id: published-at
    attributes:
      label: Published date (YYYY-MM-DD)
      placeholder: 2026-05-06
    validations:
      required: true

  - type: textarea
    id: thumbnail
    attributes:
      label: Thumbnail (optional)
      description: Drag and drop a thumbnail here. Maintainers will add it to the site for you.

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated (1–4 short tags). Reuse existing tags where it makes sense.
      placeholder: Frontend, Open Source
    validations:
      required: true

  - type: checkboxes
    id: quality
    attributes:
      label: Quality Checklist
      options:
        - label: The video is publicly accessible.
          required: true
        - label: The builder is OK with being featured.
          required: true
        - label: I understand that listing does not imply endorsement by Venice AI.
          required: true
