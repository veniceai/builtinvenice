name: Content
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          VENICE_PACKAGE_REGISTRY_READ: ${{ secrets.GITHUB_TOKEN }}
      # Schema-validates all content (loader throws on bad YAML) + runs unit tests.
      - run: npm run build
      - run: npm test

  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed paths
        id: diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          FILES=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"; echo "$FILES"
          CONTENT=false; CODE=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              content/*) CONTENT=true ;;
              *) CODE=true ;;
            esac
          done <<< "$FILES"
          echo "content=$CONTENT" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
      - name: Label content-only
        if: steps.diff.outputs.content == 'true' && steps.diff.outputs.code == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, labels: ['content-only'],
            });
      - name: Flag mixed content + code
        if: steps.diff.outputs.content == 'true' && steps.diff.outputs.code == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, labels: ['code-change'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ This PR changes both `content/` and code/config. A listing change should touch **only** `content/`. Reviewers: confirm the non-content changes are intended.',
            });
