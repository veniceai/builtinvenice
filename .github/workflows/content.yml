name: Content
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          VENICE_PACKAGE_REGISTRY_READ: ${{ secrets.GITHUB_TOKEN }}
      # Schema-validates all content (loader throws on bad YAML) + builds.
      - run: npm run build
      - run: npm run lint
      - run: npm test -- --coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
